# Model
# MODEL_PATH="/mnt/sdb1/mkx/model/Llama-3-8B-Instruct"
MODEL_PATH="/mnt/sdb1/mkx/model/Qwen2.5-7B-Instruct"
MODEL_NAME=""                 # If not passed, the default is to use the path basename

# Save and Resume
LOG_PATH_DIR="logs"           # Root log dir; col_run.sh appends /${MODEL_NAME}/DATE automatically
SAVE_DIR_BASE="/home/skl/mkx/save_checkpoint" # Root save dir; col_run.sh appends /${MODEL_NAME}/DATE_TIME automatically
SAVE_INTERVAL=""              # If not passed, the default is to save a checkpoint every epoch
# Optional resume checkpoint for either training/col_train.py or training/col_train_lora.py
LOAD_CHECKPOINT=""

# Datasets
# DATASET_PATH="/home/skl/mkx/proj/colai_ft/test/stanford_nlp_test/data/stanfordnlp_sst2_sft"
# DATASET_SPLIT="validation"              # Optional. If empty and DATASET_PATH is a DatasetDict, all splits will be concatenated.
DATASET_PATH="/home/skl/mkx/proj/colai_ft/data/datasets/finetune4096"
DATASET_SPLIT=""

# Wandb
USE_WANDB=1
WANDB_PROJECT="col_finetune"
WANDB_ENTITY="viobert-skl"
WANDB_GROUP="lora-ft"         # Recommended: group full and lora runs separately
WANDB_RUN_NAME="" # If not passed, the default is to use the model name
# USE_WANDB=0
# WANDB_PROJECT=""
# WANDB_ENTITY=""
# WANDB_GROUP=""
# WANDB_RUN_NAME=""

# Training Mode
TRAIN_MODE="lora"             # full or lora

# Parallelism
# full training usually uses hybrid_parallel
# lora training can use hybrid_parallel or zero2/zero2_cpu depending on memory/compatibility
PLUGIN_NAME="hybrid_parallel"
# PLUGIN_NAME="zero2"

# Devices
# GPUS="0,1,2,3,4,5,6,7"
GPUS="0,1,2,3"
TPSIZE=1
PPSIZE=4

# Training schedule
N_EPOCHS=5
LR="0.0002"
MAX_LENGTH=4096

BATCH_SIZE=64
MICROBATCH_SIZE=4            # For hybrid_parallel, this is per-pipeline microbatch size

# LoRA only: used by training/col_train_lora.py when TRAIN_MODE="lora"
# Adapter export is generally more reliable with zero2/zero2_cpu than hybrid_parallel.
LORA_RANK=16
LORA_ALPHA=32
LORA_DROPOUT=0.05
LORA_BIAS="none"
# LORA_TARGET_MODULES="q_proj,k_proj"
LORA_TARGET_MODULES="all-linear"
